name: release

# Build standalone `leet` binaries for each platform and attach them to the
# GitHub Release when a v* tag is pushed. Homebrew's formula downloads these.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build binaries for"
        required: true

permissions:
  contents: write # create releases + upload assets

env:
  TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # Create (or reuse) the release once, before the matrix, so the parallel build
  # jobs don't race to create the same tag ("already_exists").
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 \
            || gh release create "$TAG" --title "$TAG" --generate-notes

  build:
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # one platform failing must not cancel the others
      matrix:
        include:
          - target: bun-darwin-arm64
            asset: leet-darwin-arm64
          - target: bun-darwin-x64
            asset: leet-darwin-x64
          - target: bun-linux-x64
            asset: leet-linux-x64
          - target: bun-linux-arm64
            asset: leet-linux-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # No pre-cache during CI builds.
      - name: Install deps
        run: LEET_NO_SETUP=1 bun install --frozen-lockfile

      - name: Regenerate embedded lists
        run: bun run scripts/gen-embed.ts

      - name: Compile ${{ matrix.asset }}
        run: |
          bun build src/cli.ts --compile --target=${{ matrix.target }} --outfile ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}

      - name: Checksum
        run: shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256

      # Upload straight to the release that create-release guaranteed exists.
      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "$TAG" ${{ matrix.asset }} ${{ matrix.asset }}.sha256 --clobber
